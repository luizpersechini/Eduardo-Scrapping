[theme]
# Cota palette — emerald accent on warm-neutral
# (Streamlit doesn't accept oklch(), so these are sRGB approximations of the design tokens.)
primaryColor = "#1c1c1c"            # near-black "fg" used for primary buttons in Cota
backgroundColor = "#f7f6f1"         # warm-neutral bg  (oklch(0.985 0.005 90))
secondaryBackgroundColor = "#f0eee7"# sunk surface     (oklch(0.965 0.006 90))
textColor = "#262524"               # near-black fg    (oklch(0.22 0.01 60))
font = "sans serif"

[server]
# port omitted — defaults to 8501, override with `--server.port=NNNN`.
enableCORS = true
enableXsrfProtection = false
maxUploadSize = 10
headless = true

[browser]
gatherUsageStats = false
# serverAddress / serverPort intentionally omitted so Streamlit derives the
# displayed URL from whatever port [server].port (or `--server.port`) resolves
# to. With them hardcoded, the "You can now view your Streamlit app" message
# was misleading when running on any port other than 8501.

[runner]
magicEnabled = true
fastReruns = true
